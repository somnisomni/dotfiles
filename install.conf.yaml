# See https://github.com/anishathalye/dotbot?tab=readme-ov-file#configuration for documentation

- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
    ~/.config:
      recursive: true

- link:
    # Git
    ~/.gitignore: git/.gitignore
    ~/.gitconfig: git/.gitconfig

    # ZSH
    ~/.zshrc: zsh/.zshrc
    ~/.zprofile: zsh/.zprofile
    ~/.p10k.zsh: zsh/.powerlevel10k.zsh

    # Aria2
    ~/.config/aria2/aria2.conf: aria2/aria2.conf

    # Kitty
    ~/.config/kitty/kitty.conf: kitty/kitty.conf
    ~/.config/kitty/themes/Pnevma.conf: kitty/themes/Pnevma.conf

    # Fcitx 5
    ~/.config/fcitx5/config: fcitx5/config
    ~/.config/fcitx5/profile: fcitx5/profile
    ~/.config/fcitx5/conf/hangul.conf: fcitx5/conf/hangul.conf
    ~/.config/fcitx5/conf/mozc.conf: fcitx5/conf/mozc.conf
    ~/.config/fcitx5/conf/waylandim.conf: fcitx5/conf/waylandim.conf

    # EasyEffects
    ~/.local/share/easyeffects/output: easyeffects/output
    ~/.local/share/easyeffects/autoload: easyeffects/autoload

- shell:
    # Notice about the script
    - description: "Notice"
      command: "echo -e '\n\n[!] For the first-time setup, please run one of the following scripts based on the OS:\n
                 • Linux (Arch Linux based): ./somni-linux.sh\n
                 • macOS: ./somni-macos.sh (not ready yet)\n\n'"
      stdout: true

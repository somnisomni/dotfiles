# See https://github.com/anishathalye/dotbot?tab=readme-ov-file#configuration for documentation

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean:
    ~/:
    ~/.config:
      recursive: true

- link:
    # Git
    ~/.gitignore: .config/git/.gitignore
    ~/.gitconfig: .config/git/.gitconfig

    # ZSH
    ~/.zshrc: .config/zsh/.zshrc
    ~/.zprofile: .config/zsh/.zprofile
    ~/.p10k.zsh: .config/zsh/.powerlevel10k.zsh

    # Aria2
    ~/.config/aria2/aria2.conf: .config/aria2/aria2.conf

    # Kitty
    ~/.config/kitty/kitty.conf: .config/kitty/kitty.conf
    ~/.config/kitty/themes/Pnevma.conf: .config/kitty/themes/Pnevma.conf

    # Fcitx 5
    ~/.config/fcitx5/config: .config/fcitx5/config
    ~/.config/fcitx5/profile: .config/fcitx5/profile
    ~/.config/fcitx5/conf/hangul.conf: .config/fcitx5/conf/hangul.conf
    ~/.config/fcitx5/conf/mozc.conf: .config/fcitx5/conf/mozc.conf
    ~/.config/fcitx5/conf/waylandim.conf: .config/fcitx5/conf/waylandim.conf
    ~/.config/fcitx5/conf/classicui.conf: .config/fcitx5/conf/classicui.conf

    # PipeWire
    ~/.config/pipewire/pipewire.conf.d/somni.conf: .config/pipewire/somni.conf

    # EasyEffects
    ~/.local/share/easyeffects/output: .config/easyeffects/output
    ~/.local/share/easyeffects/autoload: .config/easyeffects/autoload

    # Niri & Noctalia Shell
    ~/.config/niri: .config/niri/niri
    ~/.config/noctalia/settings.json: .config/niri/noctalia/settings.json
    ~/.config/noctalia/plugins.json: .config/niri/noctalia/plugins.json
    ~/.config/noctalia/user-templates.toml: .config/niri/noctalia/user-templates.toml
    ~/.config/noctalia/templates: .config/niri/noctalia/templates

    # Fontconfig
    ~/.config/fontconfig: .config/fontconfig
    
- shell:
    # Notice about the script
    - description: "Notice"
      command: "echo -e '\n\n[!] For the first-time setup, please run one of the following scripts based on the OS:\n
                 • Linux (Arch Linux based): ./somni-linux.sh\n
                 • macOS: ./somni-macos.sh (not ready yet)\n\n'"
      stdout: true

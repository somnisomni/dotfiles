# See https://github.com/anishathalye/dotbot?tab=readme-ov-file#configuration for documentation

- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
    ~/.config:
      recursive: true
    # /etc/systemd/zram-generator.conf:

- link:
    # Git
    ~/.gitignore: git/.gitignore
    ~/.gitconfig: git/.gitconfig

    # ZSH
    ~/.zshrc: zsh/.zshrc
    ~/.zprofile: zsh/.zprofile

    # Aria2
    ~/.config/aria2/aria2.conf: aria2/aria2.conf

    # Alacritty
    ~/.config/alacritty/alacritty.toml: alacritty/alacritty.toml

    # # ZRAM
    # /etc/systemd/zram-generator.conf: zram/zram-generator.conf

- shell:
    # ZRAM
    - description: "Enable ZRAM   "
      command: "sudo systemctl daemon-reload && sudo systemctl start systemd-zram-setup@zram0"
      stderr: true

    # Yay
    - description: "Install yay before installing other packages   "
      command: "yes | sudo pacman -Syu --noconfirm yay"
      stderr: true
    - description: "Setting up yay   "
      command: "yay -S --save --removemake --devel --editmenu --editor 'nano'"

    # Core packages
    - description: "Install core packages   "
      command: "yes | yay -Syu --needed --answerdiff None --noconfirm --sudoloop --removemake
                git git-lfs gnupg
                nano
                wget curl aria2
                zsh oh-my-zsh-git
                parted smartmontools dosfstools exfatprogs f2fs-tools ntfs-3g bcachefs-tools btrfs-progs
                sbctl
                gzip zstd unzip xz tar
                neofetch
                openssh
                zram-generator"
      stderr: true

    # Fonts
    - description: "Install fonts   "
      command: "yes | yay -Syu --needed --answerdiff None --noconfirm --sudoloop --removemake
                otf-ibm-plex
                noto-fonts-cjk otf-noto-sans-cjk-vf otf-noto-sans-mono-cjk-vf noto-fonts-emoji
                otf-pretendard otf-pretendard-jp otf-pretendard-std
                ttf-nanum ttf-d2coding
                otf-kopub
                ttf-koruri ttf-mplus-git"
      stderr: true

    # Development packages
    - description: "Install development packages   "
      command: "yes | yay -Syu --needed --answerdiff None --noconfirm --sudoloop --removemake
                github-cli
                dotnet-sdk
                nvm
                python python-pip python-numpy python-yaml"
      stderr: true

<?xml version="1.0" encoding="UTF-8"?>

<!-- ########## somni.dotfiles.linux ########## -->
<!-- ## Fontconfig - `sans-serif` preference ## -->

<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <description>[somni] Preferred `sans-serif` font families</description>
    
    <alias binding="same">
        <family>sans-serif</family>
        <prefer>
            <family>Pretendard</family>
            <family>Pretendard JP</family>
            <family>Noto Sans CJK KR</family>
            <family>Noto Sans CJK JP</family>
            <family>Noto Sans KR</family>
            <family>Noto Sans JP</family>
            <family>Noto Sans</family>
        </prefer>
    </alias>
</fontconfig>
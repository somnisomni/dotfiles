<?xml version="1.0" encoding="UTF-8"?>

<!-- ############## somni.dotfiles.linux ############## -->
<!-- ## Fontconfig - Map `system-ui` to `sans-serif` ## -->

<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <description>[somni] Map `system-ui` family to `sans-serif`</description>

    <alias binding="same">
        <family>system</family>
        <prefer>
            <family>sans-serif</family>
        </prefer>
    </alias>

    <alias binding="same">
        <family>system-ui</family>
        <prefer>
            <family>sans-serif</family>
        </prefer>
    </alias>
</fontconfig>
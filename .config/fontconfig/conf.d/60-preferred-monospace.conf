<?xml version="1.0" encoding="UTF-8"?>

<!-- ########## somni.dotfiles.linux ########## -->
<!-- ## Fontconfig  - `monospace` preference ## -->

<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <description>[somni] Preferred `monospace` font families</description>
    
    <alias binding="same">
        <family>monospace</family>
        <prefer>
            <family>D2Coding</family>
            <family>D2CodingLigature Nerd Font Mono</family>
            <family>D2CodingLigature</family>
            <family>Noto Sans Mono CJK KR</family>
            <family>Noto Sans Mono CJK JP</family>
            <family>Noto Sans Mono KR</family>
            <family>Noto Sans Mono JP</family>
            <family>Noto Sans Mono</family>
        </prefer>
    </alias>

    <!-- TODO: apply Symbols Nerd Font or D2CodingLigature Nerd Font Mono for appropriate code ranges -->
</fontconfig>

<?xml version="1.0" encoding="UTF-8"?>

<!-- ######## somni.dotfiles.linux ######## -->
<!-- ## Fontconfig  - `serif` preference ## -->

<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <description>[somni] Preferred `serif` font families</description>
    
    <alias binding="same">
        <family>serif</family>
        <prefer>
            <family>Noto Serif CJK KR</family>
            <family>Noto Serif CJK JP</family>
            <family>Noto Serif KR</family>
            <family>Noto Serif JP</family>
            <family>Noto Serif</family>
        </prefer>
    </alias>
</fontconfig>
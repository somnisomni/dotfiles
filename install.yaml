# See https://github.com/anishathalye/dotbot?tab=readme-ov-file#configuration for documentation

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean:
    ~/:
    ~/.config:
      recursive: true

# TODO: use sudo plugin, for system-wide configuration files

- link:
    # Systemd environment.d
    ~/.config/environment.d: user/environment.d

    # XDG
    ~/.config/user-dirs.dirs: user/user-dirs.dirs

    # Git
    ~/.gitignore: user/git/.gitignore
    ~/.gitconfig: user/git/.gitconfig

    # ZSH
    ~/.zshrc: user/zsh/.zshrc
    ~/.zprofile: user/zsh/.zprofile
    ~/.p10k.zsh: user/zsh/.powerlevel10k.zsh

    # Aria2
    ~/.config/aria2/aria2.conf: user/aria2/aria2.conf

    # Kitty
    ~/.config/kitty/kitty.conf: user/kitty/kitty.conf
    ~/.config/kitty/themes/Pnevma.conf: user/kitty/themes/Pnevma.conf

    # Fcitx 5
    ~/.config/fcitx5/config: user/fcitx5/config
    ~/.config/fcitx5/profile: user/fcitx5/profile
    ~/.config/fcitx5/conf/hangul.conf: user/fcitx5/conf/hangul.conf
    ~/.config/fcitx5/conf/mozc.conf: user/fcitx5/conf/mozc.conf
    ~/.config/fcitx5/conf/waylandim.conf: user/fcitx5/conf/waylandim.conf
    ~/.config/fcitx5/conf/classicui.conf: user/fcitx5/conf/classicui.conf

    # PipeWire
    ~/.config/pipewire/pipewire.conf.d/somni.conf: user/pipewire/somni.conf

    # EasyEffects
    ~/.local/share/easyeffects/output: user/easyeffects/output
    ~/.local/share/easyeffects/autoload: user/easyeffects/autoload

    # Niri & Noctalia Shell
    ~/.config/niri: user/niri/niri
    ~/.config/noctalia/settings.json: user/niri/noctalia/settings.json
    ~/.config/noctalia/plugins.json: user/niri/noctalia/plugins.json
    ~/.config/noctalia/user-templates.toml: user/niri/noctalia/user-templates.toml
    ~/.config/noctalia/templates: user/niri/noctalia/templates

    # Fontconfig
    ~/.config/fontconfig: user/fontconfig

- shell:
    # Notice about the script
    - description: "Notice"
      command: "echo -e '\n\n[!] For the first-time setup, please run one of the following scripts based on the OS:\n
                 • Linux (Arch Linux based): ./somni-linux.sh\n
                 • macOS: ./somni-macos.sh (not ready yet)\n\n'"
      stdout: true
